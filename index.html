<script>
/* ===== AUTH ===== */
function register(){
  let users = JSON.parse(localStorage.getItem("users"))||[];
  if(users.find(u=>u.email==regEmail.value)) return alert("User exists");
  users.push({email:regEmail.value, pass:regPass.value});
  localStorage.setItem("users", JSON.stringify(users));
  alert("Registered!");
}
function login(){
  let users = JSON.parse(localStorage.getItem("users"))||[];
  let u = users.find(x=>x.email==logEmail.value && x.pass==logPass.value);
  if(!u) return alert("Invalid login");
  localStorage.setItem("session", u.email);
  load();
}
function logout(){ localStorage.removeItem("session"); location.reload(); }
function load(){
  let u = localStorage.getItem("session");
  if(u){
    auth.style.display="none";
    dashboard.style.display="block";
    welcome.innerText="👋 Welcome "+u;
  }
}
load();

/* ===== WALLET ===== */
async function connectWallet(){
  if(!window.ethereum) return alert("Install MetaMask");
  const provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  const signer = provider.getSigner();
  wallet.innerText = "🟢 " + await signer.getAddress();
}

/* ===== PRICE ===== */
let lastPrice = null;

async function getPrice(){
  const symbol = pair.value;
  const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
  const data = await res.json();
  const p = parseFloat(data.price);

  price.innerText = p.toFixed(2);

  // price color change
  if(lastPrice){
    price.style.color = p > lastPrice ? "#22c55e" : "#ef4444";
  }
  lastPrice = p;

  return p;
}

/* ===== CHART ===== */
let prices = [];
let labels = [];

const chart = new Chart(document.getElementById("chart"), {
  type:"line",
  data:{
    labels: labels,
    datasets:[{
      label:"Live Price",
      data: prices,
      borderWidth:2,
      tension:0.3
    }]
  },
  options:{
    plugins:{ legend:{display:false} },
    scales:{ x:{display:false} }
  }
});

async function updateChart(){
  const p = await getPrice();
  const time = new Date().toLocaleTimeString();

  prices.push(p);
  labels.push(time);

  if(prices.length > 30){
    prices.shift();
    labels.shift();
  }

  chart.update();
}
setInterval(updateChart, 2000);

/* ===== TRADE ===== */
let history = [];

function buy(){
  const amt = amount.value;
  if(!amt) return alert("Enter amount");

  const log = `🟢 BUY ${amt} ${pair.value}`;
  history.push(log);
  tradeLog.innerText = history.slice(-3).join("\n");
}

function sell(){
  const amt = amount.value;
  if(!amt) return alert("Enter amount");

  const log = `🔴 SELL ${amt} ${pair.value}`;
  history.push(log);
  tradeLog.innerText = history.slice(-3).join("\n");
}

/* ===== AI SIGNAL ===== */
function aiSignal(){
  const signals = [
    {text:"BUY 🚀", color:"#22c55e"},
    {text:"SELL 🔻", color:"#ef4444"},
    {text:"HOLD ⏸", color:"#eab308"}
  ];

  const pick = signals[Math.floor(Math.random()*signals.length)];
  signal.innerText = pick.text;
  signal.style.color = pick.color;
}
setInterval(aiSignal, 4000);
</script>

      // ===== SAVE API KEYS =====  
app.post("/keys", auth, async (req,res)=>{
  await User.findByIdAndUpdate(req.user.id,{
    apiKey:req.body.apiKey,
    apiSecret:req.body.apiSecret
  });
  res.send("Saved");
});

// ===== TRADE =====
app.post("/trade", auth, async (req,res)=>{
  const user = await User.findById(req.user.id);

  const {symbol, side, quantity} = req.body;
  const timestamp = Date.now();

  const query = `symbol=${symbol}&side=${side}&type=MARKET&quantity=${quantity}&timestamp=${timestamp}`;
  const signature = crypto.createHmac("sha256", user.apiSecret).update(query).digest("hex");

  const result = await axios.post(
    `https://api.binance.com/api/v3/order?${query}&signature=${signature}`,
    {},
    {headers:{'X-MBX-APIKEY':user.apiKey}}
  );

  const data = result.data;

  await Trade.create({
    userId:user._id,
    symbol:data.symbol,
    side:data.side,
    quantity:data.executedQty,
    price:data.fills[0].price
  });

  res.json(data);
});

// ===== PORTFOLIO =====
app.get("/portfolio", auth, async (req,res)=>{
  const trades = await Trade.find({userId:req.user.id});
  let p = {};
  trades.forEach(t=>{
    if(!p[t.symbol]) p[t.symbol]=0;
    p[t.symbol]+= t.side==="BUY"?t.quantity:-t.quantity;
  });
  res.json(p);
});

// ===== PNL =====
app.get("/pnl", auth, async (req,res)=>{
  const trades = await Trade.find({userId:req.user.id});
  let pnl=0;
  trades.forEach(t=>{
    pnl += t.side==="SELL"? t.price*t.quantity : -t.price*t.quantity;
  });
  res.json({pnl});
});
