      const res = await fetch("https://api.binance.com/api/v3/ticker/price");
      const data = await res.json();

      const btc = data.find(c => c.symbol === "BTCUSDT");
      const eth = data.find(c => c.symbol === "ETHUSDT");

      document.getElementById("btc").innerText = "$" + Number(btc.price).toFixed(2);
      document.getElementById("eth").innerText = "$" + Number(eth.price).toFixed(2);
    }

    getPrices();
    setInterval(getPrices, 5000);

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldTrade AI - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;

    .login-container {
      background: white;
      border-radius: 10px;

    .login-container h1 {
      color: #333;

    .login-container p {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    input[type="email"],
    input[type="password"] {
      width: 100%;

      transition: border-color 0.3s;

    input[type="email"]:focus,

<body>
  <div class="login-container">
    <h1>🚀 WorldTrade AI</h1>
    <p>Live Crypto Prices</p>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="Enter your email"
          required
        >
        <div class="error-message" id="emailError"></div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter your password"
          required
        >
        <div class="error-message" id="passwordError"></div>
      </div>
      
      <button type="submit" id="loginBtn">Login</button>
      <div class="success-message" id="successMessage">Login successful! Redirecting...</div>
    </form>
    
    <div class="crypto-prices" id="cryptoPrices">
      <h2>Live Crypto Prices</h2>
      <div class="price-item" id="btcPrice">BTC: Loading...</div>
      <div class="price-item" id="ethPrice">ETH: Loading...</div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>
    // ==================== EMAIL VALIDATION ====================
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function validateEmail(email) {
      return emailRegex.test(email);
    }

    // ==================== FIREBASE SETUP ====================
    const firebaseConfig = {
      apiKey: "BGlVk3D0H1S_sH9WqWLzUjLqSuqME8ewOMRTJMHT1m2_EZChkQVxvFn5NTJ9X5hebA5ShuP3k81dzW4fNE28VCk",
      authDomain: "worldtrade-ai.firebaseapp.com",
      projectId: "worldtrade-f1f58",
      storageBucket: "worldtrade-ai.appspot.com",
      messagingSenderId: "1:11998255908:android:9cd8087c384860ada0f1b1",
      appId: "11998255908"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ==================== DOM ELEMENTS ====================
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const successMessage = document.getElementById('successMessage');
    const cryptoPrices = document.getElementById('cryptoPrices');
    const btcPrice = document.getElementById('btcPrice');
    const ethPrice = document.getElementById('ethPrice');

    // ==================== EMAIL VALIDATION LISTENER ====================
    emailInput.addEventListener('blur', function() {
      const email = this.value.trim();
      
      if (email === '') {
        emailError.textContent = '';
        emailError.classList.remove('show');
        this.classList.remove('error');
        return;
      }
      
      if (!validateEmail(email)) {
        emailError.textContent = 'Please enter a valid email address';
        emailError.classList.add('show');
        this.classList.add('error');
      } else {
        emailError.textContent = '';
        emailError.classList.remove('show');
        this.classList.remove('error');
      }
    });

    // ==================== FORM SUBMISSION ====================
    loginForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      // Reset error messages
      emailError.textContent = '';
      emailError.classList.remove('show');
      passwordError.textContent = '';
      passwordError.classList.remove('show');
      emailInput.classList.remove('error');
      passwordInput.classList.remove('error');
      
      // Validate email
      if (!validateEmail(email)) {
        emailError.textContent = 'Please enter a valid email address';
        emailError.classList.add('show');
        emailInput.classList.add('error');
        return;
      }
      
      // Validate password
      if (password.length < 6) {
        passwordError.textContent = 'Password must be at least 6 characters';
        passwordError.classList.add('show');
        passwordInput.classList.add('error');
        return;
      }
      
      // Disable button during submission
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      
      try {
        // Attempt Firebase authentication
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;
        
        // Show success message
        successMessage.classList.add('show');
        successMessage.textContent = `Welcome, ${user.email}! Loading your dashboard...`;
        
        // Show crypto prices
        cryptoPrices.style.display = 'block';
        fetchCryptoPrices();
        
        // Redirect after 2 seconds
        setTimeout(() => {
          window.location.href = '/dashboard.html'; // Update with your dashboard URL
        }, 2000);
        
      } catch (error) {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
        
        // Handle specific Firebase errors
        switch(error.code) {
          case 'auth/user-not-found':
            emailError.textContent = 'No account found with this email';
            emailError.classList.add('show');
            emailInput.classList.add('error');
            break;
          case 'auth/wrong-password':
            passwordError.textContent = 'Incorrect password';
            passwordError.classList.add('show');
            passwordInput.classList.add('error');
            break;
          case 'auth/invalid-email':
            emailError.textContent = 'Invalid email format';
            emailError.classList.add('show');
            emailInput.classList.add('error');
            break;
          case 'auth/too-many-requests':
            emailError.textContent = 'Too many login attempts. Please try again later.';
            emailError.classList.add('show');
            break;
          default:
            emailError.textContent = error.message;
            emailError.classList.add('show');
        }
      }
    });

    // ==================== CRYPTO PRICE FETCHING ====================
    async function fetchCryptoPrices() {
      try {
        const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
        const data = await response.json();
        
        const btcValue = data.bitcoin.usd.toLocaleString();
        const ethValue = data.ethereum.usd.toLocaleString();
        
        btcPrice.textContent = `BTC: $${btcValue}`;
        ethPrice.textContent = `ETH: $${ethValue}`;
        
      } catch (error) {
        console.error('Error fetching crypto prices:', error);
        btcPrice.textContent = 'BTC: Error loading';
        ethPrice.textContent = 'ETH: Error loading';
      }
    }

    // ==================== AUTHENTICATION STATE LISTENER ====================
    auth.onAuthStateChanged(function(user) {
      if (user) {
        console.log('User logged in:', user.email);
      } else {
        console.log('User logged out');
      }
    });
  </script>
</body>
</html>
