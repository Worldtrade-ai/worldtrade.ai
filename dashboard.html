<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
    }

    body {
      background: #0b0e11;
      color: #fff;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: #14151a;
      border-bottom: 1px solid #222;
    }

    .logo {
      color: #f0b90b;
      font-size: 20px;
      font-weight: bold;
    }

    .nav-right button {
      background: #f0b90b;
      border: none;
      padding: 8px 15px;
      cursor: pointer;
      border-radius: 5px;
    }

    /* LAYOUT */
    .container {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #14151a;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h3 {
      margin-bottom: 20px;
      color: #aaa;
    }

    .sidebar a {
      display: block;
      padding: 10px;
      margin-bottom: 10px;
      text-decoration: none;
      color: #fff;
      border-radius: 5px;
    }

    .sidebar a:hover {
      background: #1e2026;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #14151a;
      padding: 20px;
      border-radius: 10px;
    }

    .card h2 {
      margin-bottom: 10px;
      color: #f0b90b;
    }

    /* TABLE */
    table {
      width: 100%;
      margin-top: 30px;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      text-align: left;
    }

    th {
      color: #aaa;
      border-bottom: 1px solid #222;
    }

    tr:hover {
      background: #1e2026;
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">MyExchange</div>
    <div class="nav-right">
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h3>Menu</h3>
      <a href="#">Dashboard</a>
      <a href="#">Wallet</a>
      <a href="#">Trade</a>
      <a href="#">Settings</a>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- CARDS -->
      <div class="cards">
        <div class="card">
          <h2>$10,000</h2>
          <p>Balance</p>
        </div>

        <div class="card">
          <h2>+2.5%</h2>
          <p>Profit</p>
        </div>

        <div class="card">
          <h2>BTC</h2>
          <p>Main Asset</p>
        </div>
      </div>

      <!-- MARKET TABLE -->
      <table>
        <tr>
          <th>Coin</th>
          <th>Price</th>
          <th>Change</th>
        </tr>

        <tr>
          <td>BTC</td>
          <td>$65,000</td>
          <td style="color:lime;">+1.2%</td>
        </tr>

        <tr>
          <td>ETH</td>
          <td>$3,200</td>
          <td style="color:red;">-0.5%</td>
        </tr>

        <tr>
          <td>BNB</td>
          <td>$600</td>
          <td style="color:lime;">+0.8%</td>
        </tr>

      </table>

    </div>
  </div>

  <!-- JS -->
  <script>
    function logout() {
      alert("Logged out!");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
